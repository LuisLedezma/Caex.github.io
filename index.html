<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Técnico 930E</title>
    <style>
        :root { --blue: #004098; --yellow: #ffcc00; --dark: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        header { background: var(--blue); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--yellow); }
        .container { padding: 15px; max-width: 700px; margin: auto; }
        #search { width: 100%; padding: 15px; border-radius: 25px; border: 2px solid var(--blue); font-size: 16px; outline: none; margin-bottom: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; border-left: 6px solid #ccc; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; color: var(--blue); font-size: 18px; }
        .details { font-size: 14px; margin-top: 8px; line-height: 1.4; }
        .label { font-weight: bold; color: #555; }
        .critica { border-left-color: #d9534f; }
        #no-result { text-align: center; color: #888; margin-top: 30px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">MANUAL DE EVENTOS 930E</div>
    <div style="font-size: 12px;">Datos extraídos del PDF - Offline</div>
</header>

<div class="container">
    <input type="text" id="search" placeholder="Buscar código o descripción..." onkeyup="buscar()">
    
    <div id="lista-eventos"></div>
    <div id="no-result">Escriba para buscar...</div>
</div>

<script>
    // Datos extraídos directamente de tu archivo "codigos falla 930-e.pdf"
    const eventos = [
        { c: "025", d: "DC Bus Overvoltage (Sobrevoltaje)", s: "Invertex", t: "Crítica", r: "Voltaje excedió los 3600V. Revisar rejillas y motores de soplado." },
        { c: "064", d: "Inverter Overtemperature", s: "Enfriamiento", t: "Advertencia", r: "Temperatura alta en módulos de potencia. Limpiar ductos de aire." },
        { c: "151", d: "Engine Oil Level Low", s: "Motor QSK60", t: "Crítica", r: "Nivel de aceite por debajo del mínimo. Detener equipo inmediatamente." },
        { c: "230", d: "Link Cocking Fault", s: "Propulsión", t: "Control", r: "Falla en la secuencia de carga del bus DC." },
        { c: "633", d: "TCI CPU Fault", s: "TCI", t: "Hardware", r: "Error interno en el procesador de control de la interface del camión." },
        { c: "638", d: "Engine Interface Fault", s: "Comunicación", t: "Sistema", r: "Pérdida de comunicación entre TCI y módulo del motor." },
        { c: "640", d: "Accel. Pedal Fault", s: "Cabina", t: "Sensor", r: "Señal fuera de rango en el pedal del acelerador." }
        // Se pueden seguir añadiendo más filas del PDF aquí
    ];

    const contenedor = document.getElementById('lista-eventos');

    function inicializar() {
        eventos.forEach(ev => {
            const div = document.createElement('div');
            div.className = `card ${ev.t === 'Crítica' ? 'critica' : ''}`;
            div.setAttribute('data-key', `${ev.c} ${ev.d.toLowerCase()} ${ev.s.toLowerCase()}`);
            div.innerHTML = `
                <h3><span style="background:var(--yellow);padding:2px 8px;border-radius:5px;color:black">${ev.c}</span> ${ev.d}</h3>
                <div class="details">
                    <p><span class="label">Sistema:</span> ${ev.s}</p>
                    <p><span class="label">Revisar:</span> ${ev.r}</p>
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    function buscar() {
        const query = document.getElementById('search').value.toLowerCase();
        const cards = document.getElementsByClassName('card');
        const noRes = document.getElementById('no-result');
        let encontrados = 0;

        if (query.length === 0) {
            for (let c of cards) c.style.display = 'none';
            noRes.style.display = 'block';
            return;
        }

        for (let c of cards) {
            if (c.getAttribute('data-key').includes(query)) {
                c.style.display = 'block';
                encontrados++;
            } else {
                c.style.display = 'none';
            }
        }
        noRes.style.display = encontrados > 0 ? 'none' : 'block';
    }

    window.onload = inicializar;
</script>

</body>
</html>
