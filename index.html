<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert AI - Komatsu 930E</title>
    <style>
        :root { --blue: #004098; --yellow: #ffcc00; --dark: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--blue); padding: 15px; text-align: center; border-bottom: 4px solid var(--yellow); font-weight: bold; font-size: 1.2em; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #252545; border-left: 4px solid var(--yellow); border-bottom-left-radius: 2px; }
        .input-area { background: #161625; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex-grow: 1; padding: 12px; border: none; border-radius: 25px; background: #2d2d44; color: white; outline: none; }
        button { background: var(--yellow); color: black; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #666; }
        .status { font-size: 11px; text-align: center; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<header>930E-2/3 EXPERT AI</header>

<div id="chat">
    <div class="msg ai">Soporte Técnico Activo. Ingrese código de falla o síntoma (Ej: Falla 025 o sobretemperatura).</div>
</div>

<div id="status" class="status"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Describa la falla..." onkeypress="if(event.key==='Enter') askAI()">
    <button id="sendBtn" onclick="askAI()">ANALIZAR</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // NUEVA CLAVE DE API CARGADA
    const API_KEY = "AQ.Ab8RN6I_Si5HPlmwEs_b_9bm4AdqU_YFCjilkGpT57Z-vqL7UA";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ 
        model: "gemini-1.5-flash",
        systemInstruction: "Eres un Ingeniero Senior experto en camiones Komatsu 930E-2 y 930E-3. Tu especialidad es Invertex II, motores QSK60 y sistemas hidráulicos. Responde de forma técnica, clara y siempre priorizando procedimientos de seguridad (LOTOTO)."
    });

    window.askAI = async () => {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const chat = document.getElementById('chat');
        const status = document.getElementById('status');
        
        if (!input.value.trim()) return;

        const prompt = input.value;
        addMsg(prompt, 'user');
        input.value = '';
        btn.disabled = true;
        status.innerText = "Consultando manuales de servicio...";

        try {
            const result = await model.generateContent(prompt);
            const response = await result.response;
            addMsg(response.text(), 'ai');
        } catch (error) {
            console.error(error);
            addMsg("Error: " + (error.message.includes("API key") ? "Clave API no activada o inválida." : "Error de conexión en faena."), 'ai');
        } finally {
            btn.disabled = false;
            status.innerText = "";
            chat.scrollTop = chat.scrollHeight;
        }
    };

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }
</script>

</body>
</html>
