<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komatsu 930E - AI Diagnostic Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .truck-shadow { shadow-lg shadow-yellow-900/20 }
        .bg-industrial { background-color: #0f172a; }
    </style>
</head>
<body class="bg-industrial text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-yellow-500/30 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-yellow-500 rounded flex items-center justify-center text-black font-black">K</div>
                <h1 class="font-bold tracking-tight text-lg uppercase">930E-2/3 <span class="text-yellow-500">Expert AI</span></h1>
            </div>
            <button onclick="configurarKey()" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full border border-slate-700 text-slate-400 transition">
                ⚙️ CONFIGURAR API
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        <div class="mt-8 space-y-6">
            <div class="bg-slate-900 p-1 border border-slate-800 rounded-2xl shadow-2xl">
                <input type="text" id="userInput" placeholder="Ej: Código A103 o síntoma de falla..." 
                    class="w-full p-5 bg-transparent border-none outline-none text-xl placeholder:text-slate-600 focus:ring-0">
            </div>
            
            <button onclick="ejecutarIA()" id="btnIA" 
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-5 rounded-2xl transition-all active:scale-95 shadow-xl uppercase tracking-widest">
                Analizar Falla en Terreno
            </button>
        </div>

        <div id="loading" class="hidden mt-12 text-center">
            <div class="inline-block w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-yellow-500 font-bold uppercase text-xs tracking-widest">Consultando manuales de servicio...</p>
        </div>

        <div id="respuesta" class="mt-12 space-y-6">
            <div class="text-center text-slate-600 py-20 border-2 border-dashed border-slate-800 rounded-3xl">
                <p class="text-sm italic">Listo para recibir códigos de avería Komatsu</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 p-8 text-center border-t border-slate-900 text-[10px] text-slate-600 uppercase tracking-widest leading-relaxed">
        Uso exclusivo para mantenimiento industrial minero<br>
        Valide siempre con el Shop Manual oficial del equipo
    </footer>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Función para pedir la API Key si no existe
        window.configurarKey = () => {
            const key = prompt("Por favor, ingresa tu API Key de Gemini (Google AI Studio):");
            if (key) {
                localStorage.setItem('GEMINI_API_KEY', key);
                alert("API Key guardada correctamente en este navegador.");
            }
        };

        window.ejecutarIA = async function() {
            const API_KEY = localStorage.getItem('GEMINI_API_KEY');
            
            if (!API_KEY) {
                alert("Primero debes configurar tu API Key usando el botón en la parte superior derecha.");
                window.configurarKey();
                return;
            }

            const promptInput = document.getElementById('userInput').value;
            const outputDiv = document.getElementById('respuesta');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('btnIA');

            if (!promptInput) return;

            loading.classList.remove('hidden');
            outputDiv.innerHTML = '';
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                const context = `Eres un Ingeniero experto en Mantenimiento de camiones Komatsu 930E-2 y 930E-3. 
                El usuario te consulta: "${promptInput}". 
                Responde de forma profesional pero directa para mecánicos en terreno usando:
                - CAUSA PROBABLE
                - PASOS DE DIAGNÓSTICO (basados en manual de taller)
                - ADVERTENCIA DE SEGURIDAD (especialmente si involucra alto voltaje o presiones hidráulicas).
                Usa modismos técnicos de minería chilena.`;

                const result = await model.generateContent(context);
                const response = await result.response;
                
                outputDiv.innerHTML = `
                    <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
                        <div class="text-yellow-500 font-black text-[10px] mb-4 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></span> Análisis de Diagnóstico
                        </div>
                        <div class="text-slate-200 text-sm leading-relaxed prose prose-invert max-w-none">
                            ${response.text().replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;

            } catch (error) {
                outputDiv.innerHTML = `
                    <div class="bg-red-900/20 border border-red-500/50 p-6 rounded-2xl text-red-400 text-xs">
                        <b>Error de Conexión:</b> Verifica que tu API Key sea válida o que tengas internet en la faena.
                    </div>
                `;
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        };
    </script>
</body>
</html>
